<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triagem</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>Triagem hospitalar</h2>

    <input id="nome" placeholder="">


    <select id="sintoma">
        <option value="">Selecione</option>
        <option value="dor_leve">Dor leve</option>
        <option value="resfriado">Resfriado</option>
        <option value="coriza">Coriza</option>
        <option value="tosse">Tosse</option>
        <option value="febre">Febre</option>
        <option value="vomito">Vomito</option>
        <option value="diarreia">Diarreia</option>
        <option value="falta_ar_moderada">Falta de ar moderada</option>
        <option value="falta_ar_grave">Falta de ar grave</option>
        <option value="infarto">Infarto</option>
        <option value="avc">Suspeita de AVC</option>
        <option value="convolsao">Convulsão</option>
        <option value="hemorragia">Hemorragia</option>

    </select>

    <input 
    id="temp"
    type="number"
    placeholder="Temperatura"
    />

    <input 
    id="alergia"
    placeholder="Alergia"
    />

    <textarea  
    id="observacao"
    placeholder="Observações"
    ></textarea>

    <div id="resultado"></div>

    <button onclick="salvar()">
        salvar triagem
    </button>

</div>

<script>
    function classificarRisco(sintoma, temperatura){
        const vermelhos = [
        "infarto",
        "avc",
        "convolsao",
        "hemorragia",
        "falta_ar_grave"
        ];

        const amarelos = [
            "febre",
            "vomito",
            "diarreia",
            "falta_ar_moderada"
        ];

        if (temperatura >= 39) {
            return "vermelho";
        }

        if (vermelhos.includes(sintoma)) {
            return "vermelho";
        }

        if (amarelos.includes(sintoms)) {
            return "amarelo"; 
        }

           return "verde";
    }

    function salvar(){

        const nome = 
        document.getElementById("nome").value;

        const sintoma = 
         document.getElementById("sintoma").value;

         const temperatura =
         Number(document.getElementById("temp").value);

         const alergia =
          document.getElementById("alergia").value;

          const observacao = 
           document.getElementById("observacao").value;

           const risco = 
           classificarRisco(sintoma, temperatura);

           fetch("http://localhost:3000/triagem", {

            method: "POST",

            headers:{
                "Content-Type": "aplication/json"
            },

            body: JSON.stringify({

                nome,
                sintoma,
                temperatura,
                alergia,
                observacao,
                risco
               
            })

           })

           .then(r => r.json ())

           .then(data =>  {

            const resultado = 
            document.getElementById("resultado");

            resultado.className - risco;

            resultado.innerHTML = 
            "Classificação: " + 
            risco.toUpperCase();

            alert("triagem salva");

           });
    }


    </script>
    
</body>
</html>
